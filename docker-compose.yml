# docker-compose.yml
# Bỏ 'version' vì đã deprecated từ Docker Compose v2

services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - ./backend/ml/models:/app/ml/models
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_started
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./frontend:/app

  # ── SCHEDULER — Cào dữ liệu traffic mỗi 30 phút ─────────────────────────
  # Chạy services/traffic_scheduler.py trong nền tự động
  # Xem log: docker compose logs -f scheduler
  scheduler:
    build: ./backend
    command: python services/traffic_scheduler.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Ho_Chi_Minh        # ← Đặt timezone container = Việt Nam

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  # pgAdmin — Giao diện đồ họa để xem và quản lý PostgreSQL
  # Truy cập: http://localhost:5050
  # Chỉ dùng khi dev, không deploy lên production
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin  # Lưu cấu hình, không cần login lại mỗi lần

volumes:
  postgres_data:
  pgadmin_data:  # Volume cho pgAdmin